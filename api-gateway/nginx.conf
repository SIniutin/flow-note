worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Docker's internal DNS resolver.
    # valid=10s — переспрашиваем DNS при масштабировании/рестарте контейнеров.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── WebSocket endpoint ────────────────────────────────────────────────
        # Имя бэкенда в переменной — nginx резолвит его динамически через resolver,
        # а не жёстко при старте (иначе "host not found in upstream" при рестарте).
        location /collab/ {
            set $collab_backend "collab-service:4000";

            proxy_pass         http://$collab_backend;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Таймаут на коннект к бэкенду — чтобы не висеть вечно если сервис упал
            proxy_connect_timeout 5s;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
