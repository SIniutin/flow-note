schema_name: wikilive_editor_contract
schema_version: 2

description: >
  Canonical document node contract for the collaborative editor.
  This contract is shared by frontend editor extensions, collab/parser,
  and pages-service indexing logic.

schema_evolution:
  v1_to_v2:
    - "embed_media: removed src, poster — media_id is now required and the only identity"
    - "embed_media: removed embed kind — external embeds are not supported"
    - "mention: id is now required"
    - "media_inline node removed — use embed_media block instead"
    - "added: task_list, task_item, callout block nodes"

document_model:
  title:
    yjs_type: Y.Text
    description: Plain text document title, stored separately from content.
  content:
    yjs_type: Y.XmlFragment
    description: Structured document body containing block and inline nodes.

rules:
  - "content must always be Y.XmlFragment"
  - "title must always be Y.Text"
  - "all block nodes must have block_id"
  - "block_id must be stable and unique within the document"
  - "page_link is an internal wiki link, not a generic URL"
  - "mention is a structured inline node, not plain text parsing"
  - "mws_table stores only metadata/reference, not table cell data"
  - "embed_media stores render metadata, not full binary payload"
  - "embed_media.media_id is required — clients must resolve the URL via media-service, never store URLs in the document"
  - "media_inline does not exist — all media is block-level via embed_media"

node_types:
  root:
    doc:
      kind: root
      group: root
      content: "block+"
      attrs: {}
      description: Root node of the content tree.

  block:
    paragraph:
      kind: block
      group: block
      content: "inline*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
      description: Standard text paragraph.

    heading:
      kind: block
      group: block
      content: "inline*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
        level:
          type: integer
          required: true
          allowed: [1, 2, 3, 4, 5, 6]
          description: Heading level.
      description: Heading block.

    blockquote:
      kind: block
      group: block
      content: "block+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
      description: Quoted block content.

    code_block:
      kind: block
      group: block
      content: "text*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
        language:
          type: string
          required: false
          description: Optional code language hint.
      description: Code block.

    bullet_list:
      kind: block
      group: block
      content: "list_item+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the list block.
      description: Unordered list.

    ordered_list:
      kind: block
      group: block
      content: "list_item+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the list block.
        start:
          type: integer
          required: false
          description: Optional starting number.
      description: Ordered list.

    list_item:
      kind: block
      group: block
      content: "paragraph block*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the list item block.
      description: Item inside a list.

    horizontal_rule:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the separator block.
      description: Visual separator.

    mws_table:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the table embed block.
        dst_id:
          type: string
          required: true
          description: External MWS datasheet/table identifier.
        view_id:
          type: string
          required: false
          description: Optional MWS view identifier.
        title:
          type: string
          required: false
          description: Optional display title for the table block.
        display:
          type: string
          required: false
          allowed: [table, cards]
          description: Preferred render mode.
      description: >
        Reference to an external MWS table. Does not contain cell data.
        Table content is stored and updated outside the document.

    embed_media:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the media block.
        kind:
          type: string
          required: true
          allowed: [image, video, audio, file]
          description: Media rendering kind.
        media_id:
          type: string
          required: true
          description: >
            Internal media asset identifier. Clients must resolve the download/
            display URL via media-service at render time. Never store a URL here.
        mime_type:
          type: string
          required: false
          description: MIME type of the media asset.
        title:
          type: string
          required: false
          description: Human-readable media title.
        alt:
          type: string
          required: false
          description: Accessibility/fallback text for images.
        width:
          type: integer
          required: false
          description: Preferred rendered width in pixels.
        height:
          type: integer
          required: false
          description: Preferred rendered height in pixels.
        file_name:
          type: string
          required: false
          description: Original or display file name.
        size_bytes:
          type: integer
          required: false
          description: File size in bytes.
      description: >
        Standalone media block. Identity is media_id only — URL is resolved
        at render time by the client via media-service.

    task_list:
      kind: block
      group: block
      content: "task_item+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the task list block.
      description: List of checkbox task items.

    task_item:
      kind: block
      group: block
      content: "paragraph block*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the task item block.
        checked:
          type: boolean
          required: true
          description: Whether the task is completed.
      description: Single checkbox item inside a task_list.

    callout:
      kind: block
      group: block
      content: "block+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the callout block.
        kind:
          type: string
          required: true
          allowed: [info, warning, danger, success, note]
          description: Visual intent of the callout.
        icon:
          type: string
          required: false
          description: Optional emoji or icon code overriding the default for the kind.
      description: Highlighted callout block with a visual intent label.

    table_of_contents:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the TOC block.
      description: Optional auto-generated table of contents block.

  inline:
    mention:
      kind: inline
      group: inline
      content: none
      attrs:
        id:
          type: string
          required: true
          description: >
            Internal identifier of the mentioned entity (user/team/group).
            Must be resolved before inserting the node — unresolved mentions
            must not be committed to the document.
        label:
          type: string
          required: true
          description: Display label of the mention, usually without leading '@'.
        kind:
          type: string
          required: true
          allowed: [user, team, group]
          description: Mention target kind.
      description: >
        Structured mention entity rendered in UI as @label.
        Must not be derived by regex as the primary source of truth.

    page_link:
      kind: inline
      group: inline
      content: none
      attrs:
        page_id:
          type: string
          required: true
          description: Target internal page identifier.
        label:
          type: string
          required: true
          description: Display label of the page link.
        anchor_block_id:
          type: string
          required: false
          description: Optional block anchor inside the target page.
      description: Internal wiki page reference.

  text:
    text:
      kind: text
      group: inline_text
      content: none
      attrs: {}
      description: Plain text node.

marks:
  bold:
    attrs: {}
    description: Bold formatting.

  italic:
    attrs: {}
    description: Italic formatting.

  underline:
    attrs: {}
    description: Underline formatting.

  strike:
    attrs: {}
    description: Strikethrough formatting.

  code:
    attrs: {}
    description: Inline code formatting.

  link:
    attrs:
      href:
        type: string
        required: true
        description: External URL.
      target:
        type: string
        required: false
        description: Optional target attribute.
      rel:
        type: string
        required: false
        description: Optional rel attribute.
    description: >
      Generic external hyperlink mark. Must not be used for internal wiki links;
      use page_link node instead.

parser_expectations:
  outputs:
    - title
    - blocks
    - page_refs
    - table_refs
    - mentions
    - media
    - plain_text
  notes:
    - "mentions must be extracted from mention nodes, not regex over text"
    - "page refs must be extracted from page_link nodes"
    - "table refs must be extracted from mws_table nodes"
    - "media refs must be extracted from embed_media nodes only"
    - "each extracted entity should be associated with source_block_id when applicable"

storage_guidelines:
  source_of_truth:
    - "Yjs snapshot/update bytes"
  derived_read_model:
    - "title"
    - "plain_text"
    - "blocks"
    - "page_refs"
    - "table_refs"
    - "mentions"
    - "media"
  do_not_store_as_source_of_truth:
    - "parsed block DTO instead of Yjs snapshot"

examples:
  title:
    type: Y.Text
    value: "Project Plan"

  content_xml_like:
    note: >
      Illustration of the logical structure. This is a conceptual XML-like view
      of Y.XmlFragment/Y.XmlElement nodes, not literal HTML.
    value: |
      <doc>
        <heading block_id="b1" level="1">
          Project Plan
        </heading>

        <paragraph block_id="b2">
          Hello
          <mention id="u123" label="slava" kind="user" />
        </paragraph>

        <paragraph block_id="b3">
          See
          <page_link page_id="page-777" label="Architecture" />
        </paragraph>

        <mws_table
          block_id="b4"
          dst_id="dst001"
          view_id="view-main"
          title="Revenue table"
          display="table"
        />

        <embed_media
          block_id="b5"
          kind="image"
          media_id="m1"
          mime_type="image/png"
          title="Mockup"
          alt="Architecture mockup"
          width="1280"
          height="720"
        />

        <callout block_id="b6" kind="warning">
          <paragraph block_id="b7">
            Do not deploy on Fridays.
          </paragraph>
        </callout>

        <task_list block_id="b8">
          <task_item block_id="b9" checked="false">
            <paragraph block_id="b10">Write tests</paragraph>
          </task_item>
          <task_item block_id="b11" checked="true">
            <paragraph block_id="b12">Update contract</paragraph>
          </task_item>
        </task_list>
      </doc>

  parsed_dto:
    value:
      title: "Project Plan"
      blocks:
        - block_id: "b1"
          type: "heading"
          text: "Project Plan"
          attrs:
            level: 1
        - block_id: "b2"
          type: "paragraph"
          text: "Hello @slava"
        - block_id: "b3"
          type: "paragraph"
          text: "See Architecture"
        - block_id: "b4"
          type: "mws_table"
          attrs:
            dst_id: "dst001"
            view_id: "view-main"
        - block_id: "b5"
          type: "embed_media"
          attrs:
            kind: "image"
            media_id: "m1"
        - block_id: "b6"
          type: "callout"
          attrs:
            kind: "warning"
        - block_id: "b8"
          type: "task_list"
      page_refs:
        - source_block_id: "b3"
          target_page_id: "page-777"
          label: "Architecture"
      table_refs:
        - source_block_id: "b4"
          dst_id: "dst001"
      mentions:
        - source_block_id: "b2"
          id: "u123"
          label: "slava"
          kind: "user"
      media:
        - source_block_id: "b5"
          media_id: "m1"
          kind: "image"
          mime_type: "image/png"
          title: "Mockup"
      plain_text: |
        Project Plan
        Hello @slava
        See Architecture
        Do not deploy on Fridays.
        Write tests
        Update contract