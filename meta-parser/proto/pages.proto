syntax = "proto3";

package pages;

service PagesService {
  rpc UpdatePageMeta(PageMetadataRequest) returns (UpdatePageMetaResponse);
}

message PageMetadataRequest {
  string page_id      = 1;
  string s3_key       = 2;
  string title        = 3;
  string content_text = 4;
  int32  word_count   = 5;
  repeated string mws_table_ids = 6;
  int64  snapshot_ts  = 7;
}

message UpdatePageMetaResponse {}
