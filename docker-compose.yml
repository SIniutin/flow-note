services:
  postgres_comment:
    image: postgres:16
    environment:
      POSTGRES_DB: commentdb
      POSTGRES_USER: comment
      POSTGRES_PASSWORD: comment
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comment -d commentdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_notify:
    image: postgres:16
    environment:
      POSTGRES_DB: notifydb
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify -d notifydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"

  comment-service:
    build:
      context: .
      dockerfile: comment-service/Dockerfile
    env_file:
      - .env.example
    environment:
      COMMENT_GRPC_PORT: 9091
      COMMENT_POSTGRES_DSN: postgres://comment:comment@postgres_comment:5432/commentdb?sslmode=disable
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      postgres_comment:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  notify-service:
    build:
      context: .
      dockerfile: notify-service/Dockerfile
    env_file:
      - .env.example
    environment:
      NOTIFY_POSTGRES_DSN: postgres://notify:notify@postgres_notify:5432/notifydb?sslmode=disable
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDR: redis:6379
    depends_on:
      postgres_notify:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
