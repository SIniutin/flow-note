services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (Object Storage) ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001, login: minioadmin/minioadmin)
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MinIO init: создать bucket "snapshots" ───────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/snapshots &&
        echo '[minio-init] bucket snapshots ready'
      "
    restart: "no"

  # ── Kafka (KRaft mode, без ZooKeeper) ────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12          # >= max ожидаемых инстансов meta-parser
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"  # base64 UUID, фиксированный для dev
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Mock Pages gRPC service ──────────────────────────────────────────────────
  mock-pages:
    image: node:20-alpine
    working_dir: /app
    command: node mock-pages/server.js
    volumes:
      - ./collab-service:/app
    expose:
      - "50051"
    environment:
      MOCK_PAGES_PORT: "50051"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "
            var n=require('net').createConnection(50051,'localhost');
            n.on('connect',function(){process.exit(0)});
            n.on('error',function(){process.exit(1)});
          "
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Mock Tables HTTP service ──────────────────────────────────────────────────
  mock-tables:
    image: node:20-alpine
    working_dir: /app
    command: node mock-tables/server.js
    volumes:
      - ./collab-service:/app
    ports:
      - "8080:8080"
    environment:
      MOCK_TABLES_PORT: "8080"
    restart: unless-stopped

  # ── Collab Service ───────────────────────────────────────────────────────────
  collab-service:
    build:
      context: ./collab-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "4001:4001"   # routing HTTP server (GET /page-instance/:id, GET /health)
    environment:
      AUTH_TOKEN: "dev-token" # в проде заменить на токен от оргов
      PORT: "4000"
      ROUTING_PORT: "4001"
      REDIS_URL: "redis://redis:6379"
      INSTANCE_ADDR: "collab-service:4000"
      MWS_API_BASE: "http://mock-tables:8080/fusion/v1"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "snapshots"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "collab-service"
      KAFKA_TOPIC: "page.snapshot.uploaded"
      FLUSH_INTERVAL_MS: "180000"
      NODE_ENV: "production"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      mock-tables:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "
            require('http').get('http://localhost:4001/health', function(r){
              process.exit(r.statusCode === 200 ? 0 : 1);
            }).on('error', function(){ process.exit(1); });
          "
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Meta-Parser ──────────────────────────────────────────────────────────────
  meta-parser:
    build:
      context: ./meta-parser
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: "meta-parser"
      KAFKA_TOPIC: "page.snapshot.uploaded"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "snapshots"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      PAGES_GRPC_ADDR: "mock-pages:50051"
      WORKER_CONCURRENCY: "4"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      mock-pages:
        condition: service_healthy

  # ── API Gateway (nginx) ──────────────────────────────────────────────────────
  api-gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      collab-service:
        condition: service_healthy

volumes:
  minio-data:          # Y.Doc snapshots (binary blobs)
  kafka-data:          # Kafka log segments
  mock-pages-snapshots:  # оставлен для совместимости, больше не используется

networks:
  default:
    name: mws-net
