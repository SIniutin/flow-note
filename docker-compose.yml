services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (Object Storage) ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001, login: minioadmin/minioadmin)
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MinIO init: создать bucket "snapshots" ───────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/snapshots &&
        echo '[minio-init] bucket snapshots ready'
      "
    restart: "no"

  # ── Kafka (KRaft mode, без ZooKeeper) ────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12          # >= max ожидаемых инстансов meta-parser
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"  # base64 UUID, фиксированный для dev
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Mock Pages gRPC service ──────────────────────────────────────────────────
  mock-pages:
    image: node:20-alpine
    working_dir: /app
    command: node mock-pages/server.js
    volumes:
      - ./collab-service:/app
    expose:
      - "50051"
    environment:
      MOCK_PAGES_PORT: "50051"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "
            var n=require('net').createConnection(50051,'localhost');
            n.on('connect',function(){process.exit(0)});
            n.on('error',function(){process.exit(1)});
          "
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Mock Tables HTTP service ──────────────────────────────────────────────────
  mock-tables:
    image: node:20-alpine
    working_dir: /app
    command: node mock-tables/server.js
    volumes:
      - ./collab-service:/app
    ports:
      - "8080:8080"
    environment:
      MOCK_TABLES_PORT: "8080"
    restart: unless-stopped

  # ── Collab Service ───────────────────────────────────────────────────────────
  collab-service:
    build:
      context: .
      dockerfile: collab-service/Dockerfile
    restart: unless-stopped
    # Порт 4000 не пробрасывается на хост — доступ только через api-gateway (/collab/).
    # Для отладки раскомментируй:
    # ports:
    #   - "4000:4000"
    expose:
      - "4000"
      - "4001"
      - "50053"
    environment:
      AUTH_TOKEN: "dev-token" # в проде заменить на токен от оргов
      PORT: "4000"
      COLLAB_GRPC_PORT: "50053"
      ROUTING_PORT: "4001"
      REDIS_URL: "redis://redis:6379"
      INSTANCE_ADDR: "collab-service:4000"
      MWS_API_BASE: "http://mock-tables:8080/fusion/v1"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "snapshots"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "collab-service"
      KAFKA_TOPIC: "page.snapshot.uploaded"
      FLUSH_INTERVAL_MS: "180000"
      NODE_ENV: "production"
      JWT_PUBLIC_KEY_PEM: "/run/secrets/jwt_public_key"
      JWT_ISSUER: "flow-note-auth"
      JWT_AUDIENCE: "flow-note-api"
    secrets:
      - jwt_public_key
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      mock-tables:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "
            require('http').get('http://localhost:4001/health', function(r){
              process.exit(r.statusCode === 200 ? 0 : 1);
            }).on('error', function(){ process.exit(1); });
          "
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── PostgreSQL (auth-service) ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (page-service) ───────────────────────────────────────────────
  postgres-pages:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pages
    volumes:
      - postgres-pages-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (comment-service) ────────────────────────────────────────────
  postgres-comment:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: comment
      POSTGRES_PASSWORD: comment
      POSTGRES_DB: commentdb
    volumes:
      - postgres-comment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comment"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (notify-service) ──────────────────────────────────────────────
  postgres-notify:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
      POSTGRES_DB: notifydb
    volumes:
      - postgres-notify-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    restart: unless-stopped
    expose:
      - "50052"
    environment:
      AUTH_GRPC_ADDR: ":50052"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/auth?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_PRIVATE_KEY_PEM: "/run/secrets/jwt_private_key"
      JWT_ISSUER: "flow-note-auth"
      JWT_AUDIENCE: "flow-note-api"
      JWT_ACCESS_TTL: "15m"
      JWT_KEY_ID: "k1"
      ENABLE_GRPC_REFLECTION: "true"
    secrets:
      - jwt_private_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Page Service ─────────────────────────────────────────────────────────────
  page-service:
    build:
      context: .
      dockerfile: pages_service/Dockerfile
    restart: unless-stopped
    expose:
      - "50051"
      - "8080"
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8080"
      DB_HOST: "postgres-pages"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "pages"
      DB_SSLMODE: "disable"
      JWT_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAvZQPaK71ljRwv8ZfZkJn
        7PoQAesa3c1SrwNaioUYRTSPrpcwvmyPtx6IbfTIARsEXjNTnkgbYQ9+3tqZyrZN
        D1R+cJQkL8aDEkdgXHAgh/6bg2M1jV8qcbIBTFGXiMI/CmJGHbkBhz8arm1Wmj8C
        g2dY0uhafN2rFGlGe90Bi3wXY463lKikF/an8fUnszqaB5y0dtZwkDZhMa7x/oU1
        LbN06I9IY+f9jAH4GePkPyR+X0P80LSvBT62bVNan1e+dfceFrn04B8p8aWLPsN8
        DtCrOJAHlTzXNmB4CgzgnqsIOG0cdJCzv8CC7QN2OkRunIFqBV7ljaH7AjY1HuEv
        UQIDAQAB
        -----END PUBLIC KEY-----
      JWT_ISSUER: "flow-note-auth"
      JWT_AUDIENCE: "flow-note-api"
    depends_on:
      postgres-pages:
        condition: service_healthy

  # ── Comment Service ───────────────────────────────────────────────────────────
  comment-service:
    build:
      context: .
      dockerfile: comment-service/Dockerfile
    restart: unless-stopped
    expose:
      - "9091"
    environment:
      COMMENT_GRPC_PORT: "9091"
      COMMENT_POSTGRES_DSN: "postgres://comment:comment@postgres-comment:5432/commentdb?sslmode=disable"
      BROKER_URL: "amqp://guest:guest@rabbitmq:5672/"
      BROKER_EXCHANGE: "flow.events"
      LOG_LEVEL: "info"
    depends_on:
      postgres-comment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Notify Service ────────────────────────────────────────────────────────────
  notify-service:
    build:
      context: .
      dockerfile: notify-service/Dockerfile
    restart: unless-stopped
    expose:
      - "9092"
    environment:
      NOTIFY_GRPC_PORT: "9092"
      NOTIFY_POSTGRES_DSN: "postgres://notify:notify@postgres-notify:5432/notifydb?sslmode=disable"
      BROKER_URL: "amqp://guest:guest@rabbitmq:5672/"
      BROKER_EXCHANGE: "flow.events"
      NOTIFY_BROKER_QUEUE: "notify-service.events"
      REDIS_ADDR: "redis:6379"
      LOG_LEVEL: "info"
    depends_on:
      postgres-notify:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Meta-Parser ──────────────────────────────────────────────────────────────
  meta-parser:
    build:
      context: ./meta-parser
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: "meta-parser"
      KAFKA_TOPIC: "page.snapshot.uploaded"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "snapshots"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      PAGES_GRPC_ADDR: "page-service:50051"
      WORKER_CONCURRENCY: "4"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      page-service:
        condition: service_started

  # ── API Gateway (nginx) ──────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      GATEWAY_ADDR: ":8080"
      AUTH_GRPC_ADDR: "auth-service:50052"
      COLLAB_GRPC_ADDR: "collab-service:50053"
      COMMENT_GRPC_ADDR: "comment-service:9091"
      COLLAB_ADDR: "collab-service:4000"
      JWT_PUBLIC_KEY_PEM: "/run/secrets/jwt_public_key"
      JWT_ISSUER: "flow-note-auth"
      JWT_AUDIENCE: "flow-note-api"
      ALLOWED_ORIGIN: ""
    secrets:
      - jwt_public_key
    depends_on:
      auth-service:
        condition: service_started
      collab-service:
        condition: service_healthy

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
  postgres-pages-data:
  postgres-comment-data:
  postgres-notify-data:
  minio-data:          # Y.Doc snapshots (binary blobs)
  kafka-data:          # Kafka log segments
  mock-pages-snapshots:  # оставлен для совместимости, больше не используется

networks:
  default:
    name: mws-net
