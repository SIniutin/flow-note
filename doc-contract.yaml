schema_name: wikilive_editor_contract
schema_version: 1

description: >
  Canonical document node contract for the collaborative editor.
  This contract is shared by frontend editor extensions, collab/parser,
  and pages-service indexing logic.

document_model:
  title:
    yjs_type: Y.Text
    description: Plain text document title, stored separately from content.
  content:
    yjs_type: Y.XmlFragment
    description: Structured document body containing block and inline nodes.

rules:
  - "content must always be Y.XmlFragment"
  - "title must always be Y.Text"
  - "all block nodes must have block_id"
  - "block_id must be stable and unique within the document"
  - "page_link is an internal wiki link, not a generic URL"
  - "mention is a structured inline node, not plain text parsing"
  - "mws_table stores only metadata/reference, not table cell data"
  - "embed_media stores render metadata, not full binary payload"

node_types:
  root:
    doc:
      kind: root
      group: root
      content: "block+"
      attrs: {}
      description: Root node of the content tree.

  block:
    paragraph:
      kind: block
      group: block
      content: "inline*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
      description: Standard text paragraph.

    heading:
      kind: block
      group: block
      content: "inline*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
        level:
          type: integer
          required: true
          allowed: [1, 2, 3, 4, 5, 6]
          description: Heading level.
      description: Heading block.

    blockquote:
      kind: block
      group: block
      content: "block+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
      description: Quoted block content.

    code_block:
      kind: block
      group: block
      content: "text*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the block.
        language:
          type: string
          required: false
          description: Optional code language hint.
      description: Code block.

    bullet_list:
      kind: block
      group: block
      content: "list_item+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the list block.
      description: Unordered list.

    ordered_list:
      kind: block
      group: block
      content: "list_item+"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the list block.
        start:
          type: integer
          required: false
          description: Optional starting number.
      description: Ordered list.

    list_item:
      kind: block
      group: block
      content: "paragraph block*"
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the list item block.
      description: Item inside a list.

    horizontal_rule:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the separator block.
      description: Visual separator.

    mws_table:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the table embed block.
        dst_id:
          type: string
          required: true
          description: External MWS datasheet/table identifier.
        view_id:
          type: string
          required: false
          description: Optional MWS view identifier.
        title:
          type: string
          required: false
          description: Optional display title for the table block.
        display:
          type: string
          required: false
          allowed: [table, cards]
          description: Preferred render mode.
      description: >
        Reference to an external MWS table. Does not contain cell data.
        Table content is stored and updated outside the document.

    embed_media:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the media block.
        kind:
          type: string
          required: true
          allowed: [image, video, audio, file, embed]
          description: Media rendering kind.
        media_id:
          type: string
          required: false
          description: Internal media asset identifier.
        src:
          type: string
          required: false
          description: Direct media URL or source link.
        mime_type:
          type: string
          required: false
          description: MIME type of the media asset.
        title:
          type: string
          required: false
          description: Human-readable media title.
        alt:
          type: string
          required: false
          description: Accessibility/fallback text, mainly for images/embeds.
        width:
          type: integer
          required: false
          description: Preferred rendered width.
        height:
          type: integer
          required: false
          description: Preferred rendered height.
        file_name:
          type: string
          required: false
          description: Original or display file name.
        size_bytes:
          type: integer
          required: false
          description: File size in bytes.
        poster:
          type: string
          required: false
          description: Thumbnail/poster URL for video or rich embed preview.
      constraints:
        at_least_one_of: [media_id, src]
      description: >
        Standalone media block. Stores only minimal identity and render metadata.

    table_of_contents:
      kind: block
      group: block
      content: none
      attrs:
        block_id:
          type: string
          required: true
          description: Stable identifier of the TOC block.
      description: Optional auto-generated table of contents block.

  inline:
    mention:
      kind: inline
      group: inline
      content: none
      attrs:
        id:
          type: string
          required: false
          description: Internal mentioned entity identifier.
        label:
          type: string
          required: true
          description: Display label of the mention, usually without leading '@'.
        kind:
          type: string
          required: true
          allowed: [user, team, group]
          description: Mention target kind.
      description: >
        Structured mention entity rendered in UI as @label.
        Must not be derived by regex as the primary source of truth.

    page_link:
      kind: inline
      group: inline
      content: none
      attrs:
        page_id:
          type: string
          required: true
          description: Target internal page identifier.
        label:
          type: string
          required: true
          description: Display label of the page link.
        anchor_block_id:
          type: string
          required: false
          description: Optional block anchor inside the target page.
      description: Internal wiki page reference.

    media_inline:
      kind: inline
      group: inline
      content: none
      attrs:
        kind:
          type: string
          required: true
          allowed: [emoji, icon, sticker, inline_file]
          description: Inline media rendering kind.
        media_id:
          type: string
          required: false
          description: Internal inline media asset identifier.
        src:
          type: string
          required: false
          description: Direct source URL for inline asset.
        mime_type:
          type: string
          required: false
          description: MIME type when applicable.
        title:
          type: string
          required: false
          description: Tooltip/fallback text.
      constraints:
        at_least_one_of: [media_id, src]
      description: Small inline media element inside text flow.

  text:
    text:
      kind: text
      group: inline_text
      content: none
      attrs: {}
      description: Plain text node.

marks:
  bold:
    attrs: {}
    description: Bold formatting.

  italic:
    attrs: {}
    description: Italic formatting.

  underline:
    attrs: {}
    description: Underline formatting.

  strike:
    attrs: {}
    description: Strikethrough formatting.

  code:
    attrs: {}
    description: Inline code formatting.

  link:
    attrs:
      href:
        type: string
        required: true
        description: External URL.
      target:
        type: string
        required: false
        description: Optional target attribute.
      rel:
        type: string
        required: false
        description: Optional rel attribute.
    description: >
      Generic external hyperlink mark. Must not be used for internal wiki links;
      use page_link node instead.

parser_expectations:
  outputs:
    - title
    - blocks
    - page_refs
    - table_refs
    - mentions
    - media
    - plain_text
  notes:
    - "mentions must be extracted from mention nodes, not regex over text"
    - "page refs must be extracted from page_link nodes"
    - "table refs must be extracted from mws_table nodes"
    - "media refs must be extracted from embed_media and optionally media_inline"
    - "each extracted entity should be associated with source_block_id when applicable"

storage_guidelines:
  source_of_truth:
    - "Yjs snapshot/update bytes"
  derived_read_model:
    - "title"
    - "plain_text"
    - "blocks"
    - "page_refs"
    - "table_refs"
    - "mentions"
    - "media"
  do_not_store_as_source_of_truth:
    - "parsed block DTO instead of Yjs snapshot"

examples:
  title:
    type: Y.Text
    value: "Project Plan"

  content_xml_like:
    note: >
      Illustration of the logical structure. This is a conceptual XML-like view
      of Y.XmlFragment/Y.XmlElement nodes, not literal HTML.
    value: |
      <doc>
        <heading block_id="b1" level="1">
          Project Plan
        </heading>

        <paragraph block_id="b2">
          Hello
          <mention id="u123" label="slava" kind="user" />
        </paragraph>

        <paragraph block_id="b3">
          See
          <page_link page_id="page-777" label="Architecture" />
        </paragraph>

        <mws_table
          block_id="b4"
          dst_id="dst001"
          view_id="view-main"
          title="Revenue table"
          display="table"
        />

        <embed_media
          block_id="b5"
          kind="image"
          media_id="m1"
          src="https://cdn.example.com/mockup.png"
          mime_type="image/png"
          title="Mockup"
          alt="Architecture mockup"
          width="1280"
          height="720"
        />

        <paragraph block_id="b6">
          small icon
          <media_inline
            kind="icon"
            media_id="icon-42"
            title="Info icon"
          />
        </paragraph>
      </doc>

  parsed_dto:
    value:
      title: "Project Plan"
      blocks:
        - block_id: "b1"
          type: "heading"
          text: "Project Plan"
          attrs:
            level: "1"
        - block_id: "b2"
          type: "paragraph"
          text: "Hello @slava"
        - block_id: "b3"
          type: "paragraph"
          text: "See Architecture"
        - block_id: "b4"
          type: "mws_table"
          attrs:
            dst_id: "dst001"
            view_id: "view-main"
        - block_id: "b5"
          type: "embed_media"
          attrs:
            kind: "image"
            media_id: "m1"
            src: "https://cdn.example.com/mockup.png"
      page_refs:
        - source_block_id: "b3"
          target_page_id: "page-777"
          label: "Architecture"
      table_refs:
        - "dst001"
      mentions:
        - source_block_id: "b2"
          id: "u123"
          label: "slava"
          kind: "user"
      media:
        - source_block_id: "b5"
          media_id: "m1"
          kind: "image"
          src: "https://cdn.example.com/mockup.png"
          mime_type: "image/png"
          title: "Mockup"
      plain_text: |
        Project Plan
        Hello @slava
        See Architecture