version: 'v1'
deps:
  - github.com/googleapis/googleapis
generate:
  inputs:
    - directory: proto
  plugins:
    - name: go
      out: ./generated
      opts:
        paths: source_relative
    - name: go-grpc
      out: ./generated
      opts:
        paths: source_relative
        require_unimplemented_servers: false
    - name: grpc-gateway
      out: ./generated
      opts:
        paths: source_relative
        generate_unbound_methods: true
