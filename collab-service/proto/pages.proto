syntax = "proto3";

package pages;

service PagesService {
  // Meta-parser → Pages: передать распарсенные метаданные страницы.
  // Вызывается meta-parser после скачивания snapshot из S3 и парсинга Y.Doc.
  rpc UpdatePageMeta(PageMetadataRequest) returns (UpdatePageMetaResponse);
}

message PageMetadataRequest {
  string page_id      = 1;
  string s3_key       = 2; // S3-ключ snapshot, из которого извлечены данные
  string title        = 3; // первый heading или первый paragraph (plain text)
  string content_text = 4; // весь plain text документа (для полнотекстового поиска)
  int32  word_count   = 5;
  repeated string mws_table_ids = 6; // dst_id всех mws_table-блоков
  int64  snapshot_ts  = 7; // unix timestamp ms события из Kafka
}

message UpdatePageMetaResponse {}
