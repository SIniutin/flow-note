syntax = "proto3";

package pages;

service PagesService {
  // Collab → Pages: сохранить Y.Doc snapshot.
  // Вызывается по таймеру (каждые 3 мин) и при idle destroy.
  rpc SaveSnapshot(SaveSnapshotRequest) returns (SaveSnapshotResponse);

  // Pages → Collab: получить последний snapshot страницы при старте.
  // Если snapshot не найден — возвращает gRPC статус NOT_FOUND.
  rpc GetSnapshot(GetSnapshotRequest) returns (stream GetSnapshotChunk);
}

message SaveSnapshotRequest {
  string page_id = 1;
  bytes  data    = 2; // Y.encodeStateAsUpdate(doc)
}

message SaveSnapshotResponse {}

message GetSnapshotRequest {
  string page_id = 1;
}

// Один чанк потокового ответа GetSnapshot.
// Если snapshot не найден — сервер возвращает статус NOT_FOUND (stream не открывается).
message GetSnapshotChunk {
  bytes data = 1; // фрагмент Y.encodeStateAsUpdate(doc)
}
