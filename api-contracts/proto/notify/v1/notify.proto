syntax = "proto3";

package notify.v1;

option go_package = "github.com/flow-note/api-contracts/generated/proto/notify/v1;notifyv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service NotifyService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse) {
    option (google.api.http) = {
      get: "/api/v1/notifications"
    };
  }

  rpc MarkRead(MarkReadRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/notifications/{notification_id}:mark-read"
      body: "*"
    };
  }

  rpc MarkAllRead(MarkAllReadRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/notifications:mark-all-read"
      body: "*"
    };
  }

  rpc NotificationStream(NotificationStreamRequest) returns (stream NotificationEvent);
}

message Notification {
  string id = 1;
  string user_id = 2;
  string type = 3;
  optional string actor_user_id = 4;
  optional string page_id = 5;
  optional string thread_id = 6;
  optional string comment_id = 7;
  string payload_json = 8;
  bool read = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp read_at = 11;
}

message ListNotificationsRequest {
  bool unread_only = 1;
  bool only_mentions = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListNotificationsResponse {
  repeated Notification items = 1;
}

message MarkReadRequest {
  string notification_id = 1;
}

message MarkAllReadRequest {}

message NotificationStreamRequest {}

message NotificationEvent {
  Notification notification = 1;
}
