syntax = "proto3";

package comment.v1;

option go_package = "github.com/flow-note/api-contracts/generated/proto/comment/v1;commentv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Comment {
  string id = 1;
  string user_id = 2;
  string parent_id = 3;
  string page_id = 4;
  string body_id = 5;
  bool deleted = 6;
  string body = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateCommentRequest {
  string parent_id = 1;
  string page_id = 2;
  string body_id = 3;
  string body = 4;
}

message ListCommentsRequest {
  string page_id = 1;
}

message CreateCommentResponce {
  Comment comment = 1;
}

message GetCommentResponce {
  Comment comment = 1;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
}

message GetCommentRequest {
  string comment_id = 1;
}

message SubscribeToCommentRequest {
  string page_id = 1;
}

message UnsubscribeToCommentRequest {
  string page_id = 1;
}

service CommentService {
  rpc MakeComment(CreateCommentRequest) returns (CreateCommentResponce) {
    option (google.api.http) = {
      post: "/v1/comments"
      body: "*"
    };
  }
  rpc SubscribeToComment(SubscribeToCommentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/comments/subscriptions"
      body: "*"
    };
  }
  rpc UnsubscribeToComment(UnsubscribeToCommentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/comments/subscriptions/{page_id}"
    };
  }
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse) {
    option (google.api.http) = {
      get: "/v1/comments"
    };
  }
  rpc GetComment(GetCommentRequest) returns (GetCommentResponce) {
    option (google.api.http) = {
      get: "/v1/comments/{comment_id}"
    };
  }
}
